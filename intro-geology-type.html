<h2>⛰ 地形地貌</h2>
<p>
  金門潮間帶的地形多樣，從平緩的沙泥質到崎嶇的岩礁質都有分佈，這直接影響了居住在其中的生物種類。
</p>
<h3>常見地形類型</h3>
<ul>
  <li>沙灘 (Sand Flats)：主要分佈在后湖等地，適合寄居蟹和各種螺貝類。</li>
  <li>泥灘 (Mud Flats)：主要出現在海灣或河口，富含有機質，是招潮蟹、彈塗魚的樂園。</li>
  <li>岩礁 (Rocky Shores)：分佈在翟山等處，適合附著性生物，如藤壺、石鱉和海藻。</li>
</ul>
