<h2>🌊 潮汐變化</h2>
<p>
  金門潮間帶的潮汐屬於半日潮或不規則半日潮，每天會有兩次漲潮和兩次退潮，潮差變化大，是造就豐富潮間帶生態的關鍵因素。
</p>
<h3>潮汐對生態的影響</h3>
<ul>
  <li>決定垂直分佈：生物必須適應每日的乾濕交替，耐旱性強的生物生活在高潮線，不耐旱的生活在低潮線。</li>
  <li>食物與養分：漲潮時帶來海洋中的浮游生物和養分；退潮時則留下陸地沖刷來的有機物質。</li>
  <li>探險時機：退潮時是人類進入潮間帶觀察生物的最佳時機，但必須隨時注意潮汐預報確保安全。</li>
</ul>
