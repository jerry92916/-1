<h2>🪨 岩石特色</h2>
<p>
  金門潮間帶的岩石以花崗岩為主，這些堅硬的岩石是金門的地質基礎。經過長期的海蝕風化，形成各種獨特的海岸景觀。
</p>
<h3>潮間帶岩石類型</h3>
<ul>
  <li>花崗片麻岩：是金門最主要的岩石類型，質地堅硬，適合海蝕平台和海蝕洞的形成。</li>
  <li>風化層：岩石表面因海水侵蝕和氧化形成的棕紅色風化層，色彩獨特。</li>
  <li>鵝卵石灘：在部分海灣，可見被海浪打磨圓潤的石塊堆積而成的灘地。</li>
</ul>
