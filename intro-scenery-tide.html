<h2>💧 潮汐美景</h2>
<p>
  潮汐的規律變化造就了潮間帶動態的自然景觀。漲潮時海浪拍打岸邊，退潮時則露出一片片生機盎然的灘地。
</p>
<h3>著名的潮汐景觀</h3>
<ul>
  <li>建功嶼摩西分海：退潮時，一條長長的石板路浮現，連接本島與建功嶼，景觀獨特。</li>
  <li>潮池生態：在岩礁區形成的潮池，猶如微型水族箱，可以近距離觀察海葵、小魚和海藻。</li>
  <li>泥灘地紋理：退潮後的泥灘上，留下招潮蟹、貝類的足跡和潮水流動的細膩紋理。</li>
</ul>
