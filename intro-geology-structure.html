<h2>🧱 地質結構</h2>
<p>
  金門的基底岩層主要是花崗片麻岩，但在潮間帶則被大量的第四紀沉積物所覆蓋，形成了獨特的海岸地質。
</p>
<h3>潮間帶地層特色</h3>
<ul>
  <li>花崗岩基座：提供了堅硬的附著表面，適合石鱉和藤壺生存。</li>
  <li>紅土與砂層：大部分沙灘和泥灘的組成，是陸地物質沖刷沉積的結果。</li>
  <li>海蝕平台：在岩礁地區，經海浪長期侵蝕形成的平坦地貌，是觀察潮池生態的絕佳地點。</li>
</ul>
