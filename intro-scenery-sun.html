<h2>🌅 日落景觀</h2>
<p>
  金門位於台灣海峽西側，許多潮間帶灘地面向西方，提供了絕佳的日落觀賞點。當夕陽灑在廣闊的沙灘和灘地上時，景色極為壯麗。
</p>
<h3>推薦觀賞地點</h3>
<ul>
  <li>建功嶼：當石板道還未被潮水完全淹沒時，在傍晚時分觀賞日落，光線將海面與步道分割，景致獨特。</li>
  <li>后湖海灘：廣闊的沙灘提供了寬廣的視野，適合在退潮後漫步觀賞日落餘暉。</li>
  <li>慈湖三角堡一帶：結合歷史遺跡和海岸線，是拍攝夕陽的熱門地點。</li>
</ul>
