<h2>🐚 螺貝與附著生物</h2>
<p>
  螺類和貝類是潮間帶的主要居民，牠們利用堅硬的外殼抵抗浪潮衝擊和乾燥。附著性生物則牢牢固定在岩石上。
</p>
<h3>代表物種</h3>
<ul>
  <li>石鱉 (Chiton)：身體有八塊殼板，緊密附著在岩石表面，靠刮食海藻為生。</li>
  <li>帽貝 (Limpet)：殼形似帽子，退潮時能緊閉殼口鎖住水分，防止乾燥。</li>
  <li>藤壺 (Barnacle)：屬於甲殼類，但外表像貝殼，頭部朝下附著在岩石上，漲潮時伸出羽毛狀的足捕食。</li>
  <li>海葵 (Sea Anemone)：常附著於潮池或岩石縫隙，利用觸手捕食漂流的小生物。</li>
</ul>
