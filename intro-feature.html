<h2>🏖 潮間帶特性總覽</h2>
<p>
  潮間帶是位於海水高潮線與低潮線之間的區域，這塊區域每天都會經歷週期性的淹沒和暴露，因此環境條件變化極為劇烈。
</p>
<p>
  金門潮間帶的範圍雖然不大，但生態多樣性豐富，是生物適應力最強的區域之一。
</p>
<h3>主要特色</h3>
<ul>
  <li>高變動性：溫度、鹽度、濕度在短時間內劇烈變化。</li>
  <li>多樣化地形：包含沙灘、泥灘、岩礁等多種棲地。</li>
  <li>豐富物種：孕育許多耐乾旱、耐高溫和高鹽度的特有生物。</li>
</ul>
