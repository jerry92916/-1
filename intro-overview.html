<h2>🌊 金門潮間帶環境簡介</h2>
<p>
  金門潮間帶位於台灣海峽西側，是一個極具戰地特色和生態價值的區域。由於海水深度較淺，
  這裡的潮差明顯，形成了大面積、多樣化的潮間帶棲地。
</p>
<p>
  生態價值：潮間帶是海岸線與海洋的緩衝地帶，不僅是許多魚蝦蟹類的育幼場，
  也是候鳥遷徙時重要的補給站。金門潮間帶特有的泥灘地更是招潮蟹和彈塗魚的樂園。
</p>
<h3>重要性</h3>
<ul>
  <li>戰地遺產：許多潮間帶地點與歷史防禦設施結合，如建功嶼。</li>
  <li>生物多樣性：擁有岩礁、沙灘、泥灘三種主要地形，生物種類豐富。</li>
  <li>觀光教育：提供了獨特的自然教育和生態導覽機會。</li>
</ul>
