<h2>🦀 蟹類與魚類</h2>
<p>
  潮間帶最具活力和動感的，非蟹類和彈塗魚莫屬。牠們是泥灘地和沙灘的指標性物種。
</p>
<h3>代表物種</h3>
<ul>
  <li>招潮蟹 (Fiddler Crab)：雄蟹擁有巨大螯足，在泥灘地上揮舞，以吸引異性和保衛領土。</li>
  <li>彈塗魚 (Mudskipper)：能利用胸鰭在泥灘上跳躍或爬行，是一種半水生的魚類，以昆蟲和小型無脊椎動物為食。</li>
  <li>和尚蟹 (Soldier Crab)：常成群結隊在沙灘上移動，形成壯觀的「行軍」隊伍。</li>
</ul>
